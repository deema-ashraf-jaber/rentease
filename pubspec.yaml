name: rentease
description: RentEase Flutter App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  dotted_border: ^3.1.0
  # State Management
  get: ^4.6.6
  get_storage: ^2.1.1

  # UI Packages
  smooth_page_indicator: ^1.2.1
  iconsax: ^0.0.8
  google_maps_flutter: ^2.9.0

  # Utilities
  intl: ^0.20.2
  http: ^1.6.0
  logger: ^2.7.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/on_boarding_images/
    - assets/icons/
    - assets/logos/
    - assets/products/
    - assets/user/
    - assets/states/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-Black.ttf
          weight: 900
    - family: Noto Sans Arabic
      fonts:
        - asset: assets/fonts/NotoSansArabic/NotoSansArabic-VariableFont_wdth,wght.ttf